server:
  port: 8084

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://host.docker.internal:5432/smartlogix
    username: postgres
    password: v8biturbo
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:SmartLogixSuperSecretKeyForJWT2024PlatformMicroservicesArchitecture!!}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

smartlogix:
  seed:
    enabled: ${SMARTLOGIX_SEED_ENABLED:true}
    admin-password: ${SMARTLOGIX_SEED_ADMIN_PASSWORD:admin123}
    user-password: ${SMARTLOGIX_SEED_USER_PASSWORD:user123}
    warehouse-password: ${SMARTLOGIX_SEED_WAREHOUSE_PASSWORD:bodega123}

management:
  endpoints:
    web:
      exposure:
        include: health,info

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/